---
name: Run tests

on: 
  push:

permissions:
  contents: read

jobs:
 tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v3.5.0

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v4.5.0
        with:
          python-version: '3.12'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install .[test]

      - name: Run python tests
        run: |
          pytest test --random-order --random-order-bucket=global --cov --cov-report=xml

      - name: Start backend
        working-directory: /home/runner/work/plotting-service/plotting-service/
        env:
          CEPH_DIR: /home/runner/work/plotting-service/plotting-service/test/test_ceph
          DEV_MODE: True
        run: uvicorn plotting_service.plotting_api:app &

